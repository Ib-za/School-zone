# Supabase Configuration for Elate School Platform
# Reference: https://supabase.com/docs/guides/cli/config

[project]
# Project reference - will be populated by Supabase CLI
# This is automatically detected from environment

[api]
# Increase payload size for file uploads
max_body_size = "50mb"

[db]
# Database connection pool settings
pool_size = 10

[auth]
# Email authentication settings
enable_email = true
enable_phone = false

# OAuth providers (configure as needed)
enable_github = false
enable_google = false

# Auto-confirm emails in development
# Set to false in production
auto_confirm = true`

[storage]
# File size limits (in bytes)
# 100MB per file
file_size_limit = 104857600

[functions]
# Node version for Edge Functions
# node_version = "18"
verify_jwt = true
